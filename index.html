<style>
:root {
  --cream: #F4EFE8;
  --warm: #FAFAF7;
  --charcoal: #181818;
  --taupe: #A89888;
  --light: #EAE0D6;
  --accent: #7C6248;
  --gold: #C9A227;
  --dark: #3D2F22;
  --green: #4CAF82;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Tajawal',sans-serif; background:var(--warm); color:var(--charcoal); overflow-x:hidden; }

/* NAV */
nav { position:fixed; top:0; left:0; right:0; z-index:999; display:flex; align-items:center; justify-content:space-between; padding:16px 40px; background:rgba(250,248,245,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--light); }
.nav-logo { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; letter-spacing:3px; text-decoration:none; color:var(--charcoal); }
.nav-logo span { color:var(--accent); font-style:italic; }
.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a { font-size:12px; letter-spacing:2px; text-decoration:none; color:var(--charcoal); text-transform:uppercase; cursor:pointer; transition:color 0.2s; }
.nav-links a:hover { color:var(--accent); }
.nav-icons { display:flex; gap:14px; align-items:center; }
.nav-btn { background:none; border:none; cursor:pointer; font-size:18px; color:var(--charcoal); position:relative; transition:color 0.2s; padding:4px; }
.nav-btn:hover { color:var(--accent); }
.cart-badge { position:absolute; top:-6px; right:-6px; background:var(--accent); color:white; font-size:9px; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Tajawal',sans-serif; }
.theme-btn { background:none; border:1px solid var(--light); cursor:pointer; font-size:14px; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.theme-btn:hover { border-color:var(--accent); background:var(--accent); }

/* ANNOUNCE BAR */
.announce { background:linear-gradient(90deg,var(--dark),var(--gold),var(--dark)); background-size:200%; animation:slideBar 4s linear infinite; color:white; text-align:center; padding:8px 40px; font-size:12px; letter-spacing:1px; position:relative; font-family:'Tajawal',sans-serif; }
@keyframes slideBar { 0%{background-position:200%} 100%{background-position:-200%} }
.announce-x { position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:white; cursor:pointer; font-size:16px; opacity:0.7; }
.announce-x:hover { opacity:1; }

/* HERO */
.hero { min-height:100vh; padding-top:80px; display:grid; grid-template-columns:1fr 1fr; align-items:center; padding-left:48px; padding-right:48px; gap:48px; }
.hero-eyebrow { font-size:11px; letter-spacing:4px; color:var(--taupe); margin-bottom:20px; text-transform:uppercase; }
.hero-title { font-family:'Playfair Display',serif; font-size:clamp(40px,5vw,68px); line-height:1.1; margin-bottom:20px; }
.hero-title em { color:var(--accent); font-style:italic; }
.hero-desc { color:var(--taupe); font-size:14px; line-height:1.8; margin-bottom:32px; max-width:420px; }
.hero-btns { display:flex; gap:12px; flex-wrap:wrap; }
.btn-primary { padding:14px 32px; background:var(--charcoal); color:white; border:none; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:13px; letter-spacing:1px; transition:background 0.2s; }
.btn-primary:hover { background:var(--accent); }
.btn-outline { padding:14px 32px; background:none; color:var(--charcoal); border:1px solid var(--charcoal); cursor:pointer; font-family:'Tajawal',sans-serif; font-size:13px; letter-spacing:1px; transition:all 0.2s; }
.btn-outline:hover { background:var(--charcoal); color:white; }
.hero-img { height:500px; background:linear-gradient(135deg,var(--cream),var(--light)); display:flex; align-items:center; justify-content:center; font-size:80px; border-radius:2px; }

/* PRODUCTS */
.section { padding:80px 48px; }
.section-header { text-align:center; margin-bottom:48px; }
.section-label { font-size:11px; letter-spacing:4px; color:var(--taupe); text-transform:uppercase; margin-bottom:12px; }
.section-title { font-family:'Playfair Display',serif; font-size:clamp(28px,4vw,42px); margin-bottom:12px; }
.section-sub { color:var(--taupe); font-size:14px; }

/* FILTER BAR */
.filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:28px; flex-wrap:wrap; padding:14px 20px; background:var(--cream); border-radius:2px; }
.filter-bar label { font-size:11px; letter-spacing:1px; color:var(--taupe); }
.f-inp { padding:7px 10px; border:1px solid var(--light); background:var(--warm); font-family:'Tajawal',sans-serif; font-size:13px; color:var(--charcoal); border-radius:2px; width:80px; }
.f-inp:focus { outline:none; border-color:var(--accent); }
.f-sel { padding:7px 10px; border:1px solid var(--light); background:var(--warm); font-family:'Tajawal',sans-serif; font-size:13px; color:var(--charcoal); border-radius:2px; cursor:pointer; }
.f-sel:focus { outline:none; border-color:var(--accent); }
.f-reset { padding:7px 12px; background:none; border:1px solid var(--light); font-family:'Tajawal',sans-serif; font-size:12px; color:var(--taupe); cursor:pointer; border-radius:2px; margin-right:auto; }
.f-reset:hover { border-color:var(--accent); color:var(--accent); }

/* FILTER TABS */
.filter-tabs { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
.filter-tab { padding:8px 20px; border:1px solid var(--light); background:none; font-family:'Tajawal',sans-serif; font-size:13px; cursor:pointer; transition:all 0.2s; border-radius:20px; color:var(--taupe); }
.filter-tab:hover { border-color:var(--accent); color:var(--accent); }
.filter-tab.active { background:var(--charcoal); color:white; border-color:var(--charcoal); }

/* PRODUCTS GRID */
.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:24px; }
.product-card { background:white; border:1px solid var(--light); transition:transform 0.3s,box-shadow 0.3s; opacity:0; transform:translateY(16px); transition:opacity 0.4s,transform 0.4s; }
.product-card.show { opacity:1; transform:translateY(0); }
.product-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.08); }
.product-img-wrap { position:relative; height:280px; overflow:hidden; background:linear-gradient(135deg,var(--cream),var(--light)); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.product-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
.product-card:hover .product-img-wrap img { transform:scale(1.06); }
.product-img-wrap .p-icon { font-size:72px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
.product-badge { position:absolute; top:12px; right:12px; background:var(--charcoal); color:white; font-size:10px; padding:3px 10px; letter-spacing:1px; }
.product-actions { position:absolute; bottom:0; left:0; right:0; display:flex; gap:0; transform:translateY(100%); transition:transform 0.3s; }
.product-card:hover .product-actions { transform:translateY(0); }
.btn-cart { flex:1; padding:12px; background:var(--charcoal); color:white; border:none; cursor:pointer; font-family:'Tajawal',sans-serif; font-size:13px; transition:background 0.2s; }
.btn-cart:hover { background:var(--accent); }
.btn-wish { width:48px; background:white; border:none; border-right:1px solid var(--light); cursor:pointer; font-size:16px; transition:background 0.2s; }
.btn-wish:hover { background:var(--cream); }
.product-info { padding:16px; }
.product-info h3 { font-family:'Playfair Display',serif; font-size:15px; margin-bottom:4px; }
.product-name-sub { font-size:12px; color:var(--taupe); margin-bottom:8px; }
.product-price { display:flex; align-items:center; gap:8px; }
.price-new { font-size:15px; font-weight:600; color:var(--charcoal); }
.price-old { font-size:12px; color:var(--taupe); text-decoration:line-through; }
.share-row { display:flex; gap:6px; margin-top:10px; }
.share-btn { padding:5px 10px; font-size:11px; border:none; cursor:pointer; border-radius:2px; font-family:'Tajawal',sans-serif; text-decoration:none; transition:opacity 0.2s; }
.share-btn:hover { opacity:0.8; }
.s-wa { background:#25D366; color:white; }
.s-tw { background:#000; color:white; }

/* CART SIDEBAR */
.cart-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; }
.cart-overlay.open { display:block; }
.cart-panel { position:fixed; top:0; left:0; bottom:0; width:400px; max-width:95vw; background:white; z-index:1001; display:flex; flex-direction:column; transform:translateX(-100%); transition:transform 0.3s; }
.cart-overlay.open .cart-panel { transform:translateX(0); }
.cart-header { padding:20px 24px; border-bottom:1px solid var(--light); display:flex; align-items:center; justify-content:space-between; }
.cart-header h3 { font-family:'Playfair Display',serif; font-size:18px; }
.cart-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--taupe); }
.cart-items { flex:1; overflow-y:auto; padding:16px 24px; }
